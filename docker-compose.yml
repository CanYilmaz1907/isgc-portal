services:
  db:
    image: postgres:16
    container_name: isgc-portal-db
    environment:
      POSTGRES_DB: isgc_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - isgc_portal_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  isgc_portal_db:
